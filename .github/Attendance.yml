name: Scrape Attendance

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'   # runs every day at 06:00 UTC (adjust to your timezone)

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run attendance scraper
        env:
          ERP_USERNAME: ${{ secrets.ERP_USERNAME }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
        run: python attendance_scraper.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-report
          path: attendance_tracker.xlsx

      - name: Deploy to GitHub Pages (optional)
        if: always()   # run even if the script fails (so you can see logs)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          enable_jekyll: true
